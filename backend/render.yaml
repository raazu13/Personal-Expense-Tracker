services:
  - type: web
    name: expense-tracker-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_PATH
        value: /data/expenses.db
      - key: FLASK_DEBUG
        value: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
